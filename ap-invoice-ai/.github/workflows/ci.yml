name: ap-invoice-ai CI

on:
  push:
    branches: [main]
    paths: ["ap-invoice-ai/**"]
  pull_request:
    paths: ["ap-invoice-ai/**"]

defaults:
  run:
    working-directory: ap-invoice-ai

jobs:
  # Fast gate: lint + typecheck + unit/guardrail tests (no DB).
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ap-invoice-ai/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  # RLS / tenant-isolation integration tests against an ephemeral Postgres.
  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ap_invoice_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Superuser URL: used to push the schema and seed orgs (BYPASSRLS).
      ADMIN_URL: postgresql://postgres:postgres@localhost:5432/ap_invoice_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ap-invoice-ai/package-lock.json
      - run: npm ci

      - name: Push schema
        env:
          DATABASE_URL: ${{ env.ADMIN_URL }}
        run: npx prisma db push --skip-generate

      - name: Apply RLS policies, roles, and constraints
        run: psql "$ADMIN_URL" -v ON_ERROR_STOP=1 -f prisma/migrations/manual/0001_rls_and_constraints.sql

      - name: Grant app_user login + schema usage
        run: |
          psql "$ADMIN_URL" -v ON_ERROR_STOP=1 -c "ALTER ROLE app_user WITH PASSWORD 'app_user_pw';"
          psql "$ADMIN_URL" -v ON_ERROR_STOP=1 -c "GRANT USAGE ON SCHEMA public TO app_user;"

      - name: Run tenant-isolation integration tests (SEC-3)
        env:
          # app_user: RLS ENFORCED. admin: BYPASSRLS for seeding.
          INTEGRATION_DATABASE_URL: postgresql://app_user:app_user_pw@localhost:5432/ap_invoice_test
          INTEGRATION_ADMIN_DATABASE_URL: ${{ env.ADMIN_URL }}
        run: npm run test:integration
