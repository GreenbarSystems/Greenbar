<?xml version="1.0" encoding="UTF-8"?>
<!-- Greenbar app icon master — three-bar company mark. See assets/README.md
     for palette, geometry, and the corner-radius rule (Apple wants rx=0). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background plate -->
  <rect width="512" height="512" rx="80" fill="#050a14"/>

  <!-- Three horizontal bars, equal height, centered. Top + bottom Greenbar
       green; middle a soft slate that reads as neutral on both light and
       dark home screens. -->
  <rect x="60" y="108" width="392" height="84" rx="14" fill="#00d68f"/>
  <rect x="60" y="214" width="392" height="84" rx="14" fill="#e8ecf2"/>
  <rect x="60" y="320" width="392" height="84" rx="14" fill="#00d68f"/>
</svg>
